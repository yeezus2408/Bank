<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" >
    <link rel="stylesheet" href="/static/css/styleLogin.css">
    <link rel="stylesheet" href="/static/css/headerStyle.css">
    <title>Document</title>
</head>
    <body>
        <div th:replace="~{fragment/header.html :: header}"></div>
            <div class="container">

                <form th:action="@{/login}" th:method="POST" th:object="${user}">
                    <div class="is-invalid" style="color: red" th:if="${param.error}">Invalid Username/Password</div>
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" placeholder="Имя пользователя/Псевдоним"/><br /><br />

                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" placeholder="Пароль"/><br /><br />

                    <input type="submit" value="Вход" />
                    <div class="registration-link-desc">Нет аккаунта? -> <a class="registration-link" href="/registration">Зарегистрироваться</a></div>
                </form>
            </div>
    </body>
</html>

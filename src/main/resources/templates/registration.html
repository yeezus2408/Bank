<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BUYSELL</title>
    <link rel="stylesheet" href="/static/css/styleRegistration.css">
    <link rel="stylesheet" href="/static/css/headerStyle.css">
<!--    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">-->
</head>
    <body>
        <div th:replace="~{fragment/header.html :: header}"></div>
        <div class="container">
            <form th:action="@{/registration}" th:method="POST" th:object="${user}">
                <label for="firstname">Имя:</label>
                <div style="color: red" class="is-invalid" th:if="${#fields.hasErrors('firstname')}" th:errors="*{firstname}">FirstName Error</div>
                <input type="text" id="firstname" th:field="*{firstname}" name="firstname" placeholder="Имя" th:classappend="${#fields.hasErrors('firstname')} ? 'invalid' : ''">


                <label for="lastname">Фамилия:</label>
                <div style="color: red" class="is-invalid" th:if="${#fields.hasErrors('lastname')}" th:errors="*{lastname}">LastName Error</div>
                <input class="is-invalid-input" type="text" th:field="*{lastname}" id="lastname" name="lastname" placeholder="Фамилия" th:classappend="${#fields.hasErrors('lastname')} ? 'invalid' : ''">



                <label for="username">Имя пользователя:</label>
                <div style="color: red" class="is-invalid" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Username Error</div>
                <input class="is-invalid-input" type="text" th:field="*{username}" id="username" name="username" placeholder="Имя пользователя/Псевдоним" th:classappend="${#fields.hasErrors('username')} ? 'invalid' : ''">


                <label for="email">Эл. почта:</label>
                <div style="color: red" class="is-invalid" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</div>
                <input class="is-invalid-input" type="email" th:field="*{email}" id="email" name="email" placeholder="E-Mail" th:classappend="${#fields.hasErrors('email')} ? 'invalid' : ''">

                <label for="phoneNumber">Номер телефона:</label>
                <div style="color: red" class="is-invalid" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}">PhoneNumber Error</div>
                <input class="is-invalid-input" type="text" th:field="*{phoneNumber}" id="phoneNumber" name="phoneNumber" placeholder="Номер телефона" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'invalid' : ''">


                <label for="password">Пароль:</label>
                <div style="color: red" class="is-invalid" th:if="${errorPassword?.booleanValue()}">Пароль должен содержать от 8-ми до 30-ти символов</div>
                <input type="password" th:field="*{password}" id="password" name="password" placeholder="Пароль" th:classappend="${errorPassword?.booleanValue()} ? 'invalid' : ''">


                <input type="submit" value="Зарегистрироваться"/>
            </form>
        </div>

    
    </body>

</html>

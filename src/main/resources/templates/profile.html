<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/css/profileStyle.css">
    <link rel="stylesheet" href="/static/css/headerStyle.css">
    <title>Document</title>
</head>
<body>
    <div th:replace="~{fragment/header.html :: header}"></div>

    <div class="glass-container">
        <h2>Личный кабинет</h2>
        <div class="profile">
            <div class="user-info">
                <form th:action="@{/uploadAvatar}" th:method="POST" id="avatarForm" enctype="multipart/form-data">
                    <input type="file" name="avatar" id="avatar" accept="image/jpeg" style="display: none">
                </form>

                <label for="avatar">
                    <img th:if="${avatar == null}" src="https://pikuco.ru/upload/test_stable/522/52297aef53d78bf473ab13748b3fe293.webp" alt="Аватар пользователя">
                    <img th:if="${avatar != null}" th:src="${avatarUrl}">
                </label>
                <h3 class="name-profile" th:text="${user.getFirstname() + ' ' + user.getLastname()}"></h3>
            </div>
            <div class="actions">
                <a href="#">Изменить профиль</a>
                <a href="myCards">Мои карты</a>
                <a href="#">История операций</a>
                <a href="#">Настройки безопасности</a>
            </div>
        </div>
    </div>
</body>
<script>
    const avatarUpload = document.getElementById('avatar');

    avatarUpload.addEventListener('change', (event) => {

        // Отправляем форму (при помощи JavaScript)
        document.getElementById("avatarForm").submit();
    });
</script>
</html>

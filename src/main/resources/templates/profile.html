<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/css/profileStyle.css">
    <link rel="stylesheet" href="/static/css/headerStyle.css">
    <title>Document</title>
</head>
<body>
    <div th:replace="~{fragment/header.html :: header}"></div>
    <div class="container">
        <h2>Личный кабинет</h2>

        <div class="user-info">
            <img th:if="${avatar == null}" src="https://via.placeholder.com/100" alt="Аватар пользователя">
            <img th:src="data:image/jpeg;base64,${avatar.data}" />
            <h3 th:text="${user.getFirstname() + ' ' + user.getLastname()}"></h3>
        </div>

        <div class="actions">
            <a href="#">Изменить профиль</a>
            <a href="myCards">Мои карты<
            <a href="#">История операций</a>
            <a href="#">Настройки безопасности</a>
        </div>

        <!-- Добавьте сюда контент личного кабинета:
             * Баланс
             * История операций
             * Настройки
             * Другие функции
        -->

    </div>
</body>
</html>
